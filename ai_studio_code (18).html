<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KY Cloud - Enterprise WMS</title>
    <!-- Modern Frameworks & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        .input-error {
            animation: shake 0.2s ease-in-out 0s 2;
            border-color: #ef4444 !important;
            background-color: #fef2f2 !important;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1) !important;
        }

        .glowing-modal { 
            box-shadow: 0 0 40px rgba(34, 197, 94, 0.3);
            border: 1px solid rgba(34, 197, 94, 0.5);
            animation: pulse-glow 2s infinite; 
        }
        @keyframes pulse-glow { 
            0% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.3); } 
            50% { box-shadow: 0 0 50px rgba(34, 197, 94, 0.5); } 
            100% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.3); } 
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- Header Navigation -->
    <header class="sticky top-0 z-40 w-full bg-white/80 border-b border-slate-200 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-1.5 rounded-lg shadow-indigo-200 shadow-lg">
                    <i data-lucide="cloud" class="text-white w-6 h-6"></i>
                </div>
                <h1 class="text-xl font-bold text-slate-900 tracking-tight">KY Cloud <span class="text-slate-400 font-normal ml-1">☁️</span></h1>
            </div>

            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 px-3 py-1 bg-emerald-50 text-emerald-700 rounded-full text-xs font-medium border border-emerald-100">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    <span data-i18n="cloudStatus">Cloud Active</span>
                </div>
                <div class="relative group">
                    <select id="langSwitcher" class="appearance-none bg-slate-100 border-none rounded-xl pl-9 pr-8 py-2 text-sm font-semibold text-slate-700 focus:ring-2 focus:ring-indigo-500 cursor-pointer transition-all">
                        <option value="zh">中文 (ZH)</option>
                        <option value="en">English (EN)</option>
                        <option value="es">Español (ES)</option>
                    </select>
                    <i data-lucide="languages" class="absolute left-3 top-2.5 w-4 h-4 text-slate-500 pointer-events-none"></i>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 space-y-8">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Registration (Left) -->
            <section class="glass-card rounded-2xl p-6 shadow-xl shadow-slate-200/50">
                <div class="flex items-center gap-3 mb-6">
                    <div class="p-2 bg-indigo-50 text-indigo-600 rounded-xl">
                        <i data-lucide="barcode" class="w-6 h-6"></i>
                    </div>
                    <h2 class="text-lg font-bold text-slate-800" data-i18n="scanningTitle">入库登记</h2>
                </div>
                
                <div class="space-y-5">
                    <div class="group relative">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block" data-i18n="labelBarcode">条形码 (后10位)</label>
                        <div class="relative">
                            <input type="text" id="scanBarcode" class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-xl outline-none transition-all group-hover:border-slate-300" data-i18n-placeholder="placeholderBarcode" placeholder="扫描条码...">
                            <i data-lucide="scan" class="absolute left-3 top-3.5 w-5 h-5 text-slate-400"></i>
                        </div>
                        <p id="barcodeError" class="absolute -bottom-5 left-0 text-[10px] text-red-600 font-bold opacity-0 transition-opacity uppercase tracking-tighter" data-i18n="errorNotFound">未找到条码</p>
                    </div>

                    <div class="group relative">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block" data-i18n="labelLocation">库位</label>
                        <div class="relative">
                            <input type="text" id="scanLocation" class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-xl outline-none transition-all group-hover:border-slate-300" data-i18n-placeholder="placeholderLocation" placeholder="输入存储库位...">
                            <i data-lucide="map-pin" class="absolute left-3 top-3.5 w-5 h-5 text-slate-400"></i>
                        </div>
                    </div>
                    <div id="scanStatus" class="text-sm font-semibold h-5 flex items-center gap-2"></div>
                </div>
            </section>

            <!-- Query SKU (Right) -->
            <section class="glass-card rounded-2xl p-6 shadow-xl shadow-slate-200/50">
                <div class="flex items-center gap-3 mb-6">
                    <div class="p-2 bg-emerald-50 text-emerald-600 rounded-xl">
                        <i data-lucide="search" class="w-6 h-6"></i>
                    </div>
                    <h2 class="text-lg font-bold text-slate-800" data-i18n="queryTitle">云端查询</h2>
                </div>
                
                <div class="space-y-5">
                    <div class="group relative">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block" data-i18n="labelSku">SKU 编码</label>
                        <div class="flex gap-2">
                            <div class="relative flex-1">
                                <input type="text" id="querySkuInput" class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-xl outline-none transition-all group-hover:border-slate-300" data-i18n-placeholder="placeholderSku" placeholder="输入 SKU...">
                                <i data-lucide="hash" class="absolute left-3 top-3.5 w-5 h-5 text-slate-400"></i>
                            </div>
                            <button id="btnQuery" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 rounded-xl font-bold transition-all flex items-center gap-2 shadow-lg shadow-emerald-100">
                                <i data-lucide="send" class="w-4 h-4"></i>
                                <span data-i18n="btnSearch">搜索</span>
                            </button>
                        </div>
                        <p id="skuSearchError" class="absolute -bottom-5 left-0 text-red-600 text-[10px] font-bold opacity-0 transition-opacity uppercase tracking-tighter" data-i18n="errorNoSku">库位中未找到该 SKU</p>
                    </div>
                    <div class="bg-slate-50 border border-slate-100 p-4 rounded-xl mt-4">
                        <p class="text-xs text-slate-400 leading-relaxed italic" data-i18n="searchHint">搜索云端全局库存记录，实时同步。</p>
                    </div>
                </div>
            </section>
        </div>

        <!-- Inventory Table -->
        <section class="glass-card rounded-2xl shadow-xl shadow-slate-200/50 overflow-hidden">
            <div class="px-6 py-5 border-b border-slate-100 flex flex-wrap justify-between items-center gap-4 bg-white/50">
                <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                    <span data-i18n="inventoryTitle">云端实时库存</span>
                    <span class="text-xs bg-slate-200 text-slate-600 px-2 py-0.5 rounded-full font-bold" id="itemCount">0</span>
                </h2>
                
                <div class="flex items-center gap-3">
                    <div class="relative">
                        <i data-lucide="map-pinned" class="absolute left-3 top-2.5 w-4 h-4 text-slate-400"></i>
                        <input type="text" id="filterLocation" class="pl-9 pr-4 py-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all" data-i18n-placeholder="filterLocationPlaceholder" placeholder="筛选库位...">
                    </div>
                    <div class="relative">
                        <i data-lucide="calendar" class="absolute left-3 top-2.5 w-4 h-4 text-slate-400"></i>
                        <input type="date" id="filterDate" class="pl-9 pr-4 py-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    </div>
                </div>
            </div>

            <div class="overflow-x-auto custom-scroll max-h-[600px]">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50/50 sticky top-0 z-10 backdrop-blur-sm">
                        <tr>
                            <th class="p-4 border-b text-[11px] font-bold uppercase tracking-wider text-slate-500" data-i18n="colTime">时间</th>
                            <th class="p-4 border-b text-[11px] font-bold uppercase tracking-wider text-slate-500" data-i18n="colBarcode">条码</th>
                            <th class="p-4 border-b text-[11px] font-bold uppercase tracking-wider text-slate-500" data-i18n="colSku">SKU</th>
                            <th class="p-4 border-b text-[11px] font-bold uppercase tracking-wider text-slate-500" data-i18n="colSkc">SKC</th>
                            <th class="p-4 border-b text-[11px] font-bold uppercase tracking-wider text-slate-500" data-i18n="colLocation">库位</th>
                            <th class="p-4 border-b text-[11px] font-bold uppercase tracking-wider text-slate-500 text-center" data-i18n="colActions">操作</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryBody" class="divide-y divide-slate-100 text-slate-700"></tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Modal -->
    <div id="queryModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full glowing-modal text-center transform scale-100 transition-all">
            <div class="mb-6 inline-flex p-4 bg-emerald-100 text-emerald-600 rounded-full">
                <i data-lucide="check-circle" class="w-12 h-12"></i>
            </div>
            <h3 class="text-slate-500 font-bold text-xs uppercase tracking-widest mb-2" data-i18n="modalTitle">货物所在库位:</h3>
            <div id="modalLocationDisplay" class="text-6xl font-black text-slate-900 mb-6 tracking-tighter">---</div>
            
            <div class="flex gap-3 mb-8">
                <div class="flex-1 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1" data-i18n="modalSku">SKU 编码</p>
                    <p id="modalSkuDisplay" class="text-xs font-bold text-indigo-600 truncate">---</p>
                </div>
                <div class="flex-1 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1" data-i18n="modalSkc">SKC 编码</p>
                    <p id="modalSkcDisplay" class="text-xs font-bold text-slate-500 truncate">---</p>
                </div>
            </div>
            
            <div class="flex flex-col gap-3">
                <button id="btnDeleteRecord" class="w-full bg-red-500 hover:bg-red-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-red-100 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                    <span data-i18n="btnDelete">立即从云端删除</span>
                </button>
                <button id="btnKeepRecord" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 py-4 rounded-2xl font-bold transition-all" data-i18n="btnKeep">保留并关闭</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://jbmasixvsgwypughjhzk.supabase.co';
        const SB_KEY = 'sb_publishable_40rCwoGI6jW2TfBjB7OoTA_E9X5nGex';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const translations = {
            zh: {
                cloudStatus: "云端已连接", appTitle: "KY Cloud", scanningTitle: "入库登记", 
                queryTitle: "云端查询", labelBarcode: "条形码 (后10位)", labelLocation: "库位", 
                labelSku: "SKU 编码", btnSearch: "搜索", searchHint: "搜索云端全局库存记录，实时同步。", 
                inventoryTitle: "云端实时库存", colTime: "扫描时间", colBarcode: "条码", 
                colSku: "SKU", colSkc: "SKC", colLocation: "库位", colActions: "操作", 
                modalTitle: "货物所在库位:", btnDelete: "立即从云端删除", btnKeep: "保留并关闭", 
                placeholderBarcode: "扫描条码...", placeholderLocation: "输入存储库位...", 
                placeholderSku: "输入 SKU...", filterLocationPlaceholder: "筛选库位...", 
                saveSuccess: "已同步至云端", errorNotFound: "主库未找到该条码", errorNoSku: "未找到该 SKU",
                modalSku: "SKU 编码", modalSkc: "SKC 编码"
            },
            en: {
                cloudStatus: "Cloud Active", appTitle: "KY Cloud", scanningTitle: "Registration", 
                queryTitle: "Cloud Query", labelBarcode: "Barcode (Last 10 Digits)", labelLocation: "Location", 
                labelSku: "SKU Code", btnSearch: "Search", searchHint: "Search global cloud records with real-time sync.", 
                inventoryTitle: "Cloud Inventory", colTime: "Scan Time", colBarcode: "Barcode", 
                colSku: "SKU", colSkc: "SKC", colLocation: "Location", colActions: "Actions", 
                modalTitle: "Item Location:", btnDelete: "Delete from Cloud", btnKeep: "Keep & Close", 
                placeholderBarcode: "Scan barcode...", placeholderLocation: "Enter location...", 
                placeholderSku: "Enter SKU...", filterLocationPlaceholder: "Filter location...", 
                saveSuccess: "Synced to cloud", errorNotFound: "Barcode not found", errorNoSku: "SKU not found",
                modalSku: "SKU Code", modalSkc: "SKC Code"
            },
            es: {
                cloudStatus: "Nube Activa", appTitle: "KY Cloud", scanningTitle: "Registro", 
                queryTitle: "Consulta Nube", labelBarcode: "Código (Últimos 10)", labelLocation: "Ubicación", 
                labelSku: "SKU", btnSearch: "Buscar", searchHint: "Registros globales con sincronización en tiempo real.", 
                inventoryTitle: "Inventario en Tiempo Real", colTime: "Hora", colBarcode: "Código", 
                colSku: "SKU", colSkc: "SKC", colLocation: "Ubicación", colActions: "Acciones", 
                modalTitle: "Ubicación:", btnDelete: "Eliminar de la Nube", btnKeep: "Cerrar", 
                placeholderBarcode: "Escanear...", placeholderLocation: "Ubicación...", 
                placeholderSku: "SKU...", filterLocationPlaceholder: "Filtrar...", 
                saveSuccess: "Sincronizado", errorNotFound: "No encontrado", errorNoSku: "No encontrado",
                modalSku: "Código SKU", modalSkc: "Código SKC"
            }
        };

        let currentLang = 'zh';
        let activeMapping = null;
        let currentQueryRecordId = null;
        let cachedInventory = [];
        
        // Fix 1: Request Locking Flag
        let isSubmitting = false;
        // Fix 2: Initialization Guard Flag
        let isInitialized = false;

        function updateUI() {
            const t = translations[currentLang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.textContent = t[key];
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (t[key]) el.placeholder = t[key];
            });
            lucide.createIcons();
        }

        async function init() {
            // Fix 2: Prevent multiple event listener stacking
            if (isInitialized) return;
            isInitialized = true;

            updateUI();
            fetchInventory();
            
            // Single Realtime subscription
            supabaseClient
                .channel('any')
                .on('postgres_changes', { event: '*', table: 'inventory', schema: 'public' }, () => fetchInventory())
                .subscribe();

            document.getElementById('querySkuInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') document.getElementById('btnQuery').click();
            });
        }

        async function fetchInventory() {
            const { data, error } = await supabaseClient.from('inventory').select('*').order('TIME', { ascending: false });
            if (!error) {
                cachedInventory = data;
                applyFilters();
            }
        }

        function applyFilters() {
            const loc = document.getElementById('filterLocation').value.trim().toLowerCase();
            const date = document.getElementById('filterDate').value;
            const filtered = cachedInventory.filter(item => {
                const matchLoc = item.LOCATION.toLowerCase().includes(loc);
                let matchDate = true;
                if (date) {
                    const itemDate = new Date(item.TIME).toISOString().split('T')[0];
                    matchDate = (itemDate === date);
                }
                return matchLoc && matchDate;
            });
            renderTable(filtered);
        }

        function renderTable(data) {
            const body = document.getElementById('inventoryBody');
            document.getElementById('itemCount').textContent = data.length;
            body.innerHTML = data.map(r => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-4 text-[10px] font-mono text-slate-400">${new Date(r.TIME).toLocaleString()}</td>
                    <td class="p-4 text-sm font-medium text-slate-700">${r.BARCODE || ''}</td>
                    <td class="p-4 text-sm font-bold text-indigo-600">${r.SKU || ''}</td>
                    <td class="p-4 text-sm text-slate-500">${r.SKC || ''}</td>
                    <td class="p-4">
                        <span class="inline-flex items-center gap-1.5 bg-slate-100 text-slate-700 px-2.5 py-1 rounded-lg text-xs font-bold uppercase border border-slate-200">
                            <i data-lucide="map-pin" class="w-3 h-3 text-slate-400"></i>${r.LOCATION || ''}
                        </span>
                    </td>
                    <td class="p-4 text-center">
                        <button onclick="deleteCloudRow('${r.id || r.TIME}', ${!!r.id})" class="text-slate-300 hover:text-red-500 transition-all p-1 hover:bg-red-50 rounded-lg">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </td>
                </tr>`).join('');
            lucide.createIcons();
        }

        const barcodeInput = document.getElementById('scanBarcode');
        barcodeInput.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const rawBar = barcodeInput.value.trim();
                if (!rawBar) return;

                const tenDigitBarcode = rawBar.slice(-10);
                barcodeInput.value = tenDigitBarcode;

                const { data, error } = await supabaseClient
                    .from('product_data')
                    .select('sku, skc, goods_bar_cd')
                    .eq('goods_bar_cd', tenDigitBarcode)
                    .maybeSingle();

                if (data) {
                    activeMapping = { ...data, processedBarcode: tenDigitBarcode };
                } else {
                    activeMapping = { sku: "", skc: "", processedBarcode: tenDigitBarcode };
                }
                
                barcodeInput.classList.remove('input-error');
                document.getElementById('barcodeError').style.opacity = "0";
                document.getElementById('scanLocation').focus();
            }
        });

        const locationInput = document.getElementById('scanLocation');
        locationInput.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                // Fix 1: Request Locking & UI Disable
                if (isSubmitting) return;
                
                const loc = locationInput.value.trim();
                if (!loc || !activeMapping) return;

                isSubmitting = true;
                locationInput.disabled = true;

                try {
                    const { error } = await supabaseClient.from('inventory').insert([{
                        TIME: new Date().toISOString(),
                        BARCODE: activeMapping.processedBarcode,
                        SKU: activeMapping.sku,
                        SKC: activeMapping.skc,
                        LOCATION: loc
                    }]);

                    if (!error) {
                        const status = document.getElementById('scanStatus');
                        status.innerHTML = `<i data-lucide="check-circle" class="w-4 h-4 text-emerald-500"></i> ${translations[currentLang].saveSuccess}`;
                        
                        // Fix 3: Immediate State Reset
                        activeMapping = null;
                        
                        barcodeInput.value = ''; 
                        locationInput.value = ''; 
                        barcodeInput.focus();
                        lucide.createIcons();
                        setTimeout(() => status.innerHTML = "", 2000);
                    }
                } catch (err) {
                    console.error("Submission error:", err);
                } finally {
                    // Fix 1: Release Lock & Re-enable UI
                    isSubmitting = false;
                    locationInput.disabled = false;
                }
            }
        });

        async function deleteCloudRow(keyValue, hasIdColumn) {
            let query = supabaseClient.from('inventory').delete();
            if (hasIdColumn) query = query.eq('id', keyValue);
            else query = query.eq('TIME', keyValue);
            await query;
        }

        document.getElementById('btnQuery').onclick = async () => {
            const skuVal = document.getElementById('querySkuInput').value.trim();
            if (!skuVal) return;
            const { data, error } = await supabaseClient.from('inventory').select('*').eq('SKU', skuVal).limit(1).single();
            if (data) {
                currentQueryRecordId = data.id || data.TIME;
                const hasId = !!data.id;
                document.getElementById('modalLocationDisplay').textContent = data.LOCATION;
                document.getElementById('modalSkuDisplay').textContent = data.SKU || '---';
                document.getElementById('modalSkcDisplay').textContent = data.SKC || '---';
                document.getElementById('queryModal').classList.remove('hidden');
                document.getElementById('btnDeleteRecord').onclick = async () => {
                    await deleteCloudRow(currentQueryRecordId, hasId);
                    document.getElementById('queryModal').classList.add('hidden');
                };
            } else {
                const input = document.getElementById('querySkuInput');
                input.classList.add('input-error');
                document.getElementById('skuSearchError').style.opacity = "1";
                setTimeout(() => {
                    input.classList.remove('input-error');
                    document.getElementById('skuSearchError').style.opacity = "0";
                }, 2000);
            }
        };

        document.getElementById('btnKeepRecord').onclick = () => document.getElementById('queryModal').classList.add('hidden');
        document.getElementById('filterLocation').oninput = applyFilters;
        document.getElementById('filterDate').onchange = applyFilters;
        document.getElementById('langSwitcher').onchange = (e) => { currentLang = e.target.value; updateUI(); };

        init();
    </script>
</body>
</html>
